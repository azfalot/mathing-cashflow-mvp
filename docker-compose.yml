services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mathing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mathing"]
      interval: 5s
      timeout: 5s
      retries: 20

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mathing
      JWT_SECRET: dev-secret-change-me
      PORT: 4000
    command:
      [
        "sh",
        "-c",
        "pnpm --filter api prisma:generate && pnpm --filter api exec prisma migrate deploy && pnpm --filter api prisma:seed",
      ]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mathing
      JWT_SECRET: dev-secret-change-me
      PORT: 4000
    ports:
      - "4002:4000"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4002/api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4002/api
    ports:
      - "3002:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
